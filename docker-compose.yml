version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: semaines-de-langues-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: semaines-de-langues

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: semaines-de-langues-backend
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    environment:
      MONGODB_URI: mongodb://mongodb:27017/semaines-de-langues
      PORT: 5000
      JWT_SECRET: your_jwt_secret_change_in_production
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/pnpm_home
    command: pnpm dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: semaines-de-langues-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/pnpm_home

volumes:
  mongo-data:
